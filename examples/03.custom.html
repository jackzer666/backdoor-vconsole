<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自定义配置示例</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { text-align: center; color: #333; }
    .demo-section {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 { margin-top: 0; color: #666; font-size: 18px; }
    p { color: #888; font-size: 14px; }
    button {
      display: inline-block;
      padding: 12px 24px;
      font-size: 16px;
      color: #fff;
      background: #007aff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #0056cc; }
    button:active { transform: scale(0.98); }
    .desc {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 13px;
      color: #666;
    }
    .tips {
      background: #e3f2fd;
      padding: 10px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 13px;
      color: #1565c0;
    }
    code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>自定义配置示例</h1>

  <div class="demo-section">
    <h2>快速点击 - 自定义参数</h2>
    <p>传入自定义 <code>count</code> 和 <code>interval</code> 参数</p>
    <button id="customBtn">点击我 3 次 (自定义)</button>
    <div class="desc">
      自定义配置：3 次点击 / 500ms 间隔内完成
    </div>
    <div class="tips">
      参数说明：<br>
      <code>count</code>: 触发所需的点击次数，默认 7<br>
      <code>interval</code>: 点击间隔超时时间(ms)，默认 300
    </div>
  </div>

  <script type="module">
    import { rapidClicks } from '../index.js';

    rapidClicks({
      target: '#customBtn',
      count: 3,
      interval: 500,
    });
  </script>
</body>
</html>
